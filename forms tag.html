<!DOCTYPE html>
<html>
<head>
    <title>HTML Form Tags</title>
</head>
<body>

<h2>Modern HTML Form Elements</h2>

<form action="#" method="post">

    <!-- Text Inputs -->
    Name: <input type="text" name="name"><br><br>

    Password: <input type="password" name="password"><br><br>

    Email: <input type="email" name="email"><br><br>

    Number: <input type="number" name="number"><br><br>

    Date: <input type="date" name="date"><br><br>

    File Upload: <input type="file" name="file"><br><br>

    Radio:
    <input type="radio" name="gender"> Male
    <input type="radio" name="gender"> Female<br><br>

    Checkbox:
    <input type="checkbox" name="agree"> I Agree<br><br>

    Range:
    <input type="range" name="range"><br><br>

    Color:
    <input type="color" name="color"><br><br>

    Search:
    <input type="search" name="search"><br><br>

    URL:
    <input type="url" name="url"><br><br>

    Telephone:
    <input type="tel" name="phone"><br><br>

    <!-- Buttons -->
    <input type="submit" value="Submit">
    <input type="reset" value="Reset">

</form>

<hr>

<h2>Form Structure Tags</h2>

<form>
    <fieldset>
        <legend>Personal Info</legend>
        Name: <input type="text"><br>
        Age: <input type="number">
    </fieldset>
</form>

<hr>

<h2>Unknown / Old / Deprecated Form Tags</h2>

<!-- Old input types -->
<input type="text" name="old1" size="40"><br>
<input type="image" src="submit" alt="submit button"><br>



</body>
</html>
